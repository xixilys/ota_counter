plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def releaseApkFileName = "OTA-Counter-v${flutterVersionName}.apk"

android {
    namespace = "top.huangxuanqi.otacounter"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "top.huangxuanqi.otacounter"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            // Prefer the local release keystore when it exists so future APKs
            // can upgrade in place. Keep the debug fallback for clean clones.
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
}

android.applicationVariants.configureEach { variant ->
    if (variant.buildType.name == "release") {
        variant.outputs.all {
            outputFileName = releaseApkFileName
        }

        variant.assembleProvider.configure {
            doLast {
                def packageApplication = variant.packageApplicationProvider.get()
                def outputDirectory = packageApplication.outputDirectory.get().asFile
                def releaseOutputFile = new File(outputDirectory, releaseApkFileName)
                if (releaseOutputFile.exists()) {
                    copy {
                        from(releaseOutputFile)
                        into(layout.buildDirectory.dir("outputs/flutter-apk"))
                    }
                }
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}

// Flutter 3.41 injects empty CMake tasks only to force an NDK download.
// This project has no native sources to build, so skipping those tasks keeps
// release APK builds working on machines without a full Android native toolchain.
afterEvaluate {
    tasks.matching { task ->
        task.name.startsWith("configureCMake") || task.name.startsWith("buildCMake")
    }.configureEach {
        enabled = false
    }
}
